aid: qualtrics
name: Qualtrics
description: >-
  Qualtrics is an experience management platform providing REST APIs for managing
  surveys, accessing response data, distributing surveys, managing contacts, and
  automating XM programs at scale. The Qualtrics v3 API enables developers to
  automate repetitive processes, integrate data across systems, and build custom
  extensions for customer, employee, product, and brand experience programs.
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
