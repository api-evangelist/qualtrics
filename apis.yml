apis:
  - name: Qualtrics REST API
    description: >-
      The Qualtrics v3 REST API provides programmatic access to the Qualtrics
      Experience Management platform. Endpoints cover organizations, divisions,
      groups, users, surveys, survey responses, response imports, message library,
      graphic library, distributions, event subscriptions, XM Directory, and
      Insights Platform contacts.
    image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://api.qualtrics.com/
    baseURL: https://yourdatacenterid.qualtrics.com/API/v3/
    tags:
      - Surveys
      - Responses
      - Distributions
      - Contacts
      - Users
    properties:
